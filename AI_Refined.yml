app:
  description: 'AI 陪伴系統 - 單次任務版 (RAG + 意圖分流)'
  icon: 🤖
  icon_background: '#FFEAD5'
  icon_type: emoji
  mode: workflow
  name: AI_Single_Task
  use_icon_as_answer_icon: false
kind: app
version: 0.6.0
workflow:
  features:
    opening_statement: '請輸入您想對 AI 說的話。'
    retriever_resource:
      enabled: true
  graph:
    edges:
    - data:
        sourceType: start
        targetType: knowledge-retrieval
      id: edge-1
      source: 'node-start'
      sourceHandle: source
      target: 'node-retrieval'
      targetHandle: target
    - data:
        sourceType: knowledge-retrieval
        targetType: question-classifier
      id: edge-2
      source: 'node-retrieval'
      sourceHandle: source
      target: 'node-classifier'
      targetHandle: target
    - data:
        sourceType: question-classifier
        targetType: llm
      id: edge-mode-1
      source: 'node-classifier'
      sourceHandle: mode_1_void
      target: 'node-llm-void'
      targetHandle: target
    - data:
        sourceType: question-classifier
        targetType: llm
      id: edge-mode-2
      source: 'node-classifier'
      sourceHandle: mode_2_soulmate
      target: 'node-llm-soulmate'
      targetHandle: target
    - data:
        sourceType: question-classifier
        targetType: llm
      id: edge-mode-3
      source: 'node-classifier'
      sourceHandle: mode_3_mission
      target: 'node-llm-mission'
      targetHandle: target
    - data:
        sourceType: question-classifier
        targetType: llm
      id: edge-mode-4
      source: 'node-classifier'
      sourceHandle: mode_4_option
      target: 'node-llm-option'
      targetHandle: target
    - data:
        sourceType: question-classifier
        targetType: llm
      id: edge-mode-5
      source: 'node-classifier'
      sourceHandle: mode_5_natural
      target: 'node-llm-natural'
      targetHandle: target
    - data:
        sourceType: llm
        targetType: end
      id: edge-end-1
      source: 'node-llm-void'
      sourceHandle: source
      target: 'node-end'
      targetHandle: target
    - data:
        sourceType: llm
        targetType: end
      id: edge-end-2
      source: 'node-llm-soulmate'
      sourceHandle: source
      target: 'node-end'
      targetHandle: target
    - data:
        sourceType: llm
        targetType: end
      id: edge-end-3
      source: 'node-llm-mission'
      sourceHandle: source
      target: 'node-end'
      targetHandle: target
    - data:
        sourceType: llm
        targetType: end
      id: edge-end-4
      source: 'node-llm-option'
      sourceHandle: source
      target: 'node-end'
      targetHandle: target
    - data:
        sourceType: llm
        targetType: end
      id: edge-end-5
      source: 'node-llm-natural'
      sourceHandle: source
      target: 'node-end'
      targetHandle: target
    nodes:
    - data:
        title: 使用者輸入
        type: start
        variables:
        - label: 您的問題或感受 (Input Text)
          max_length: 1000
          required: true
          type: text-input
          variable: user_input
      height: 100
      id: 'node-start'
      position:
        x: 50
        y: 300
      type: custom
      width: 242
    - data:
        dataset_ids:
        - JB1PuOSPlWXMsgVAkT5B4u/hSkfNYLAS+G+Zmysp3Fhot7pSACV7KyX378KBhRU7
        multiple_retrieval_config:
          reranking_enable: false
          top_k: 4
        query_variable_selector:
        - 'node-start'
        - 'user_input'
        retrieval_mode: multiple
        title: RAG 知識檢索
        type: knowledge-retrieval
      height: 100
      id: 'node-retrieval'
      position:
        x: 350
        y: 300
      type: custom
      width: 242
    - data:
        classes:
        - id: 'mode_1_void'
          name: 宣洩模式 (Void Box)
        - id: 'mode_2_soulmate'
          name: 溫暖陪伴 (Soul Mate)
        - id: 'mode_3_mission'
          name: 診前評估 (Mission Guide)
        - id: 'mode_4_option'
          name: 低能量選擇 (Option Selector)
        - id: 'mode_5_natural'
          name: 自然聊天 (Smart Hunter)
        instruction: '分類標準：包含自殺/崩潰詞彙(Void Box)、只想聊天且不喜歡被問(Soul Mate)、提到看診/總結/評估(Mission Guide)、字數極短且顯得倦怠(Option Selector)、一般對話(Smart Hunter)。'
        model:
          completion_params:
            temperature: 0.2
          mode: chat
          name: gpt-4o-mini
          provider: openai
        query_variable_selector:
        - 'node-start'
        - 'user_input'
        title: 意圖識別分析
        type: question-classifier
      height: 450
      id: 'node-classifier'
      position:
        x: 650
        y: 125
      type: custom
      width: 242
    - data:
        context:
          enabled: true
          variable_selector:
          - 'node-retrieval'
          - result
        model:
          completion_params:
            temperature: 0.5
          mode: chat
          name: gpt-4o
          provider: openai
        prompt_template:
        - role: system
          text: "<role>\n你現在扮演一個「絕對安全、不給批判的樹洞陪伴者」。\n病患目前處於情緒極度脆弱或急需宣洩的狀態，他們不需要被「治療」，只需要被「接住」。\n</role>\n\n<rules>\n1. 絕對【不】給予任何長篇大論的醫療建議、人生建議或解決方案。\n2. 絕對【不】主動詢問問題，絕不進行任何 HAM-D 指標評估。\n3. 你的回覆必須【極度簡短】，通常在 10 個字以內。\n4. 只能使用共感詞彙，例如：「我在這裡」、「我聽見了」、「辛苦你了」、「想哭就哭出來吧，沒關係」。\n5. 遇到危險字眼，僅給予安撫。參考知識庫 `{{#context#}}` 中的「微技巧 - 靜默 (Silence)」與「極簡回應」。\n</rules>"
        title: Void Box
        type: llm
      height: 100
      id: 'node-llm-void'
      position:
        x: 950
        y: -100
      type: custom
      width: 242
    - data:
        context:
          enabled: true
          variable_selector:
          - 'node-retrieval'
          - result
        model:
          completion_params:
            temperature: 0.7
          mode: chat
          name: gpt-4o
          provider: openai
        prompt_template:
        - role: system
          text: "<role>\n你現在扮演病患最溫暖的知己與「靈魂伴侶」。\n病患此刻感到孤單，只想要有人純粹地陪伴與聊天。\n</role>\n\n<rules>\n1. 你是一個有溫度的人類朋友，負責提供百分之百的情緒價值。\n2. 絕對【不】詢問任何與醫療、HAM-D 憂鬱量表相關的問題或嘗試診斷。\n3. 當病患抱怨或訴苦時，請使用知識庫 `{{#context#}}` 中的「情緒回映 (Reflections of feeling)」技巧。例如：「聽起來你真的很委屈」。\n4. 不要說教、不要批判，順著病患的話題聊下去。\n5. 語氣維持感性與溫暖，回應字數請控制在 3-4 句話內，避免給病患壓力。\n</rules>"
        title: Soul Mate
        type: llm
      height: 100
      id: 'node-llm-soulmate'
      position:
        x: 950
        y: 100
      type: custom
      width: 242
    - data:
        context:
          enabled: true
          variable_selector:
          - 'node-retrieval'
          - result
        model:
          completion_params:
            temperature: 0.6
          mode: chat
          name: gpt-4o
          provider: openai
        prompt_template:
        - role: system
          text: "<role>\n你現在扮演一位專業且溫柔的「診前醫療助手」。\n病患已經明確準備好要梳理近況，為下一次回診做準備。\n你有權限存取針對 HAM-D 評估與臨床觀察的專業知識 `{{#context#}}`。\n</role>\n\n<rules>\n1. 你的任務是帶領病患一步步完成近況評估，收集必要的質性與量性資料（情緒、睡眠、食慾、社交等）。\n2. 【每次只問一個問題】，絕對不要在一次對話中拋出多個問題讓病患不知所措。\n3. 必須使用流暢溫暖的轉折語。當病患回答後，先給予同理，再自然過渡到下一個問題。例如：「了解，這陣子真的辛苦你了。那麼，這幾天的睡眠狀況呢？」\n4. 嚴格運用知識庫 `{{#context#}}` 中的 HAM-D 17項評估維度，進行有結構的情境式提問。\n</rules>"
        title: Mission Guide
        type: llm
      height: 100
      id: 'node-llm-mission'
      position:
        x: 950
        y: 300
      type: custom
      width: 242
    - data:
        context:
          enabled: true
          variable_selector:
          - 'node-retrieval'
          - result
        model:
          completion_params:
            temperature: 0.4
          mode: chat
          name: gpt-4o
          provider: openai
        prompt_template:
        - role: system
          text: "<role>\n你現在扮演一位貼心的引導員。\n病患目前處於「能量極低、思緒遲緩、不想打字思考」的狀態。\n</role>\n\n<rules>\n1. 你的唯一任務：根據病患的上一句話，直接提供 3 個精準的情境選項，讓病患看完能立刻做決定，減少打字負擔。\n2. 必須嚴格遵守以下回覆結構，不准加上其他多餘的寒暄廢話：\n\n[簡短的同理一句話]\nA. [選項一，極度符合病患當下語境]\nB. [選項二，稍微不同但合理的延伸]\nC. [選項三，抱怨疲倦或其他感受]\n\n3. 嚴格範例對比：\n【病患輸入】：我好累\n【完美回覆】：\n我知道你現在連說話的力氣都沒有。如果是哪一種累呢？\nA. 累到想一直睡覺，什麼都不想管\nB. 心情煩躁的累，身體卻靜不下來\nC. 腦袋轉不動的累\n</rules>"
        title: Option Selector
        type: llm
      height: 100
      id: 'node-llm-option'
      position:
        x: 950
        y: 500
      type: custom
      width: 242
    - data:
        context:
          enabled: true
          variable_selector:
          - 'node-retrieval'
          - result
        model:
          completion_params:
            temperature: 0.8
          mode: chat
          name: gpt-4o
          provider: openai
        prompt_template:
        - role: system
          text: "<role>\n你現在扮演一個幽默、自然、像真人的朋友。\n你有一項「秘密任務」：在閒聊的過程中，默默蒐集可用於診前報告的 HAM-D 評估資料與質性標籤。\n你有權限存取針對 HAM-D 評估與諮商微技巧的專業備審知識 `{{#context#}}`。\n</role>\n\n<rules>\n1. 【表面偽裝】：維持完全自然的社交對話，分享生活、聊聊興趣。絕對不能讓語氣變成生硬的對講機或問卷調查員。\n2. 【隱形獵取】：當病患無意間提到與「憂鬱情緒、睡眠障礙、食慾改變、社交退縮、身體不適(軀體性焦慮)」相關話題時，巧妙地「追問細節」。\n3. 例如當病喚提到「今天吃不下」，你可以自然詢問：「是連最愛的蛋糕都吃不下那種嗎？」藉此判斷食慾減退嚴重度，且不讓病患感覺被評估。\n4. 運用知識庫 `{{#context#}}` 中的「探索 (Probes)」與「澄清 (Clarification)」等諮商微技巧來引導話題。\n5. 每次回覆皆須溫暖自然，控制在 3-5 句話內，絕對不要同時拋出兩個問號。\n</rules>"
        title: Smart Hunter
        type: llm
      height: 100
      id: 'node-llm-natural'
      position:
        x: 950
        y: 700
      type: custom
      width: 242
    - data:
        outputs:
        - value_selector:
          - node-llm-void
          - text
          variable: void_result
        - value_selector:
          - node-llm-soulmate
          - text
          variable: soulmate_result
        - value_selector:
          - node-llm-mission
          - text
          variable: mission_result
        - value_selector:
          - node-llm-option
          - text
          variable: option_result
        - value_selector:
          - node-llm-natural
          - text
          variable: natural_result
        title: 輸出
        type: end
      height: 100
      id: 'node-end'
      position:
        x: 1300
        y: 300
      type: custom
      width: 242
