kind: app
version: 0.6.0
app:
  name: AI_Chat_Companion
  mode: workflow
  description: AI companion chatflow for triage and support
  icon: robot
  icon_background: '#FFEAD5'
  icon_type: emoji
  use_icon_as_answer_icon: false
workflow:
  conversation_variables: []
  environment_variables: []
  features:
    opening_statement: "開始前想先和你確認一件事：你是否願意讓我在對話中蒐集可整理成醫師參考的資訊？如果可以，直接回覆「可以」；如果不想，回覆「不要」。\n\n你也可以隨時用以下指令切換模式：option、void、mission、smart、soul、emergency。"
    retriever_resource:
      enabled: true
    sensitive_word_avoidance:
      enabled: false
    speech_to_text:
      enabled: false
    suggested_questions: []
    suggested_questions_after_answer:
      enabled: false
    text_to_speech:
      enabled: false
      language: ''
      voice: ''
  graph:
    edges:
