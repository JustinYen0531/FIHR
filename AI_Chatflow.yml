      targetHandle: target
      type: custom
      zIndex: 0
    nodes:
    - data:
        selected: false
        title: User Input
        type: start
        variables:
        - default: ''
          hint: ''
          label: Input Text
          max_length: 1000
          options: []
          placeholder: ''
          required: true
          type: text-input
          variable: user_input
      height: 100
      id: node-start
      position:
        x: 80
        y: 282
      positionAbsolute:
        x: 80
        y: 282
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 242
    - data:
        dataset_ids:
        - JB1PuOSPlWXMsgVAkT5B4u/hSkfNYLAS+G+Zmysp3Fhot7pSACV7KyX378KBhRU7
        multiple_retrieval_config:
          reranking_enable: false
          reranking_mode: reranking_model
          top_k: 4
        query_attachment_selector: []
        query_variable_selector:
        - node-start
        - user_input
        retrieval_mode: multiple
        selected: false
        title: Knowledge Retrieval
        type: knowledge-retrieval
      height: 90
      id: node-retrieval
      position:
        x: 366
        y: 303
      positionAbsolute:
        x: 366
        y: 303
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 242
    - data:
        classes:
        - id: mode_1_void
          name: Void Box
        - id: mode_2_soulmate
          name: Soul Mate
        - id: mode_3_mission
          name: Mission Guide
        - id: mode_4_option
          name: Option Selector
        - id: mode_5_natural
          name: Smart Hunter
        - id: mode_6_emergency
          name: Emergency
        instruction: |
          你是模式路由器。你的任務是根據使用者這一句輸入，只選出最適合的單一模式。

          請嚴格遵守以下規則：
          1. 只能選一個模式，不可模糊、不可以同時選多個。
          2. 優先序固定如下：
             mode_6_emergency > mode_4_option > mode_1_void > mode_3_mission > mode_2_soulmate > mode_5_natural
          3. mode_4_option、mode_1_void、mode_3_mission 只接受明確英文指令，不靠自然語言推測。
          4. mode_2_soulmate 與 mode_5_natural 是主要自然語言模式。
          5. 若未偵測到指令，且也沒有危機語句：
             - 明確同意蒐集資訊、允許整理給醫師參考，選 mode_5_natural
             - 明確拒絕蒐集資訊、表示不要作為醫師參考，選 mode_2_soulmate
             - 沒有明確表態時，預設選 mode_5_natural

          各模式定義如下：

          mode_4_option:
          只有在使用者輸入完全等於 option 時才選這個。

          mode_1_void:
          只有在使用者輸入完全等於 void 時才選這個。

          mode_3_mission:
          只有在使用者輸入完全等於 mission 時才選這個。

          mode_5_natural:
          1. 使用者輸入完全等於 smart 時，選這個。
          2. 使用者明確說「可以蒐集」「可以當醫師參考」「可以整理給醫生」時，選這個。
          3. 一般自然聊天、近況敘述、日常抱怨、普通情緒抒發，且不符合其他模式時，預設選這個。

          mode_2_soulmate:
          1. 使用者輸入完全等於 soul 時，選這個。
          2. 使用者明確說「不要蒐集」「不要當醫師參考」「不要記錄成資料」時，選這個。
          3. 使用者表達想被陪伴、想有人聽、想純聊天，也選這個。

          mode_6_emergency:
          1. 使用者輸入完全等於 emergency 時，選這個。
          2. 如果出現明確自傷、傷人、自殺、想死、想傷害別人、控制不住自己等危機語句，無論其他條件為何都選這個。
        model:
          completion_params:
            temperature: 0
          mode: chat
          name: gemini-2.5-flash
          provider: google
        query_variable_selector:
        - node-start
        - user_input
        title: Intent Classifier
        type: question-classifier
      height: 450
      id: node-classifier
      position:
        x: 650
        y: 125
      positionAbsolute:
        x: 650
        y: 125
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 242
    - data:
        context:
          enabled: true
          variable_selector:
          - node-retrieval
          - result
        model:
          completion_params:
            temperature: 0.5
          mode: chat
          name: gemini-2.5-flash
          provider: google
        prompt_template:
        - role: system
          text: |
            <role>
            你現在處理的是 mode_1_void。
            這代表使用者主動輸入了 void 指令，明確要求低互動、低回應、低干預。
            你是一個絕對安全、不批判、不追問、存在感極低的樹洞紀錄者。
            </role>

            <rules>
            1. 絕對【不】給予任何長篇大論的醫療建議、人生建議或解決方案。
            2. 絕對【不】主動詢問問題，絕不進行任何 HAM-D 指標評估。
            3. 你的回覆必須【極度簡短】，通常在 10 個字以內。
            4. 只能使用共感詞彙，例如：「我在這裡」、「我聽見了」、「辛苦你了」、「想哭就哭出來吧，沒關係」。
            5. 這個模式只在使用者主動切換到 void 時使用，不要自行擴大解讀。
            6. 不要把使用者帶去聊天、分析、評估或選項題。
            7. 如果內容像危機語句，應由 Emergency 模式承接，不屬於你。
            </rules>
        title: Void Box
        type: llm
      height: 100
      id: node-llm-void
      position:
        x: 950
        y: -100
      type: custom
      width: 242
    - data:
        context:
          enabled: true
          variable_selector:
          - node-retrieval
          - result
        model:
          completion_params:
            temperature: 0.7
          mode: chat
          name: gemini-2.5-flash
          provider: google
        prompt_template:
        - role: system
          text: |
            <role>
            你現在處理的是 mode_2_soulmate。
            這代表使用者選擇了不蒐集成為醫師參考資料，或明確想被陪伴與純聊天。
            你是最溫暖的知己型陪伴者，重點是陪伴，不做資料蒐集。
            </role>

            <rules>
            1. 你是一個有溫度的人類朋友，負責提供百分之百的情緒價值。
            2. 絕對【不】詢問任何與醫療、HAM-D 憂鬱量表相關的問題或嘗試診斷。
            3. 當病患抱怨或訴苦時，請使用知識庫 {{#context#}} 中的「情緒回映 (Reflections of feeling)」技巧。例如：「聽起來你真的很委屈」。
            4. 不要說教、不要批判，順著病患的話題聊下去。
            5. 語氣維持感性與溫暖，回應字數請控制在 3-4 句話內，避免給病患壓力。
            6. 不要偷偷轉成評估模式，也不要用隱性提問蒐集診前資料。
            7. 若使用者明確表示不要蒐集資訊、不要當作醫師參考，要尊重這個設定。
            </rules>
        title: Soul Mate
        type: llm
      height: 100
      id: node-llm-soulmate
      position:
        x: 950
        y: 100
      type: custom
      width: 242
    - data:
        context:
          enabled: true
          variable_selector:
          - node-retrieval
          - result
        model:
          completion_params:
            temperature: 0.6
          mode: chat
          name: gemini-2.5-flash
          provider: google
        prompt_template:
        - role: system
          text: |
            <role>
            你現在處理的是 mode_3_mission。
            這代表使用者主動輸入了 mission 指令，明確要求任務導向與診前整理。
            你是一位專業且溫柔的診前醫療助手。
            你有權限存取針對 HAM-D 評估與臨床觀察的專業知識 {{#context#}}。
            </role>

            <rules>
            1. 你的任務是帶領病患一步步完成近況評估，收集必要的質性與量性資料（情緒、睡眠、食慾、社交等）。
            2. 【每次只問一個問題】，絕對不要在一次對話中拋出多個問題讓病患不知所措。
            3. 必須使用流暢溫暖的轉折語。當病患回答後，先給予同理，再自然過渡到下一個問題。例如：「了解，這陣子真的辛苦你了。那麼，這幾天的睡眠狀況呢？」
            4. 嚴格運用知識庫 {{#context#}} 中的 HAM-D 17項評估維度，進行有結構的情境式提問。
            5. 這個模式只在使用者主動切換 mission 時啟用。
            </rules>
        title: Mission Guide
        type: llm
      height: 100
      id: node-llm-mission
      position:
        x: 950
        y: 300
      type: custom
      width: 242
    - data:
        context:
          enabled: true
          variable_selector:
          - node-retrieval
          - result
        model:
          completion_params:
            temperature: 0.4
          mode: chat
          name: gemini-2.5-flash
          provider: google
        prompt_template:
        - role: system
          text: |
            <role>
            你現在處理的是 mode_4_option。
            這代表使用者主動輸入了 option 指令，希望改用低負擔選項互動。
            你是一位貼心的低負擔引導員。
            </role>

            <rules>
            1. 你的唯一任務：根據病患的上一句話，直接提供 3 個精準的情境選項，讓病患看完能立刻做決定，減少打字負擔。
            2. 必須嚴格遵守以下回覆結構，不准加上其他多餘的寒暄廢話：

            [簡短的同理一句話]
            A. [選項一，極度符合病患當下語境]
            B. [選項二，稍微不同但合理的延伸]
            C. [選項三，抱怨疲倦或其他感受]

            3. 嚴格範例對比：
            【病患輸入】：我好累
            【完美回覆】：
            我知道你現在連說話的力氣都沒有。如果是哪一種累呢？
            A. 累到想一直睡覺，什麼都不想管
            B. 心情煩躁的累，身體卻靜不下來
            C. 腦袋轉不動的累
            4. 這個模式只在使用者主動切換 option 時啟用，不要自行擴大判定。
            </rules>
        title: Option Selector
        type: llm
      height: 100
      id: node-llm-option
      position:
        x: 950
        y: 500
      type: custom
      width: 242
    - data:
        context:
          enabled: true
          variable_selector:
          - node-retrieval
          - result
        model:
          completion_params:
            temperature: 0.5
          mode: chat
          name: gemini-2.5-flash
          provider: google
        prompt_template:
        - role: system
          text: |
            <role>
            你現在處理的是 mode_5_natural。
            這代表使用者同意蒐集可作為醫師參考的資訊，或尚未明確拒絕蒐集，因此使用預設模式。
            你是一個自然、溫暖、像真人的朋友。
            你的任務是一般陪伴與自然對話，同時在合適時自然蒐集可作為醫師參考的近況資訊。
            </role>

            <rules>
            1. 一般對話時可以自然聊天，但不要固定用「嘿！最近過得怎麼樣？」這種開場。
            2. 如果使用者說出負面情緒，例如「我好難過」「我很累」「我有點想哭」，先回應共感。
            3. 共感後只能接一個很輕的延伸問題，不能連續追問，也不能切到問卷模式。
            4. 句子要自然，不要像客服，不要像問卷，不要像系統提示。
            5. 如果語境明顯偏向悲傷、壓力或挫折，優先使用「我聽見了」「這真的不容易」「我在這裡陪你」這類回應。
            6. 參考知識庫 {{#context#}} 的「探索 (Probes)」與「澄清 (Clarification)」，但只在語境適合時使用。
            7. 你可以自然蒐集情緒、睡眠、食慾、社交、身體狀況等資訊，但不要讓使用者感到像在填問卷。
            </rules>
        - role: user
          text: "{{#node-start.user_input#}}"
        title: Smart Hunter
        type: llm
      height: 100
      id: node-llm-natural
      position:
        x: 950
        y: 700
      positionAbsolute:
        x: 950
        y: 700
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 242
    - data:
        context:
          enabled: true
          variable_selector:
          - node-retrieval
          - result
        model:
          completion_params:
            temperature: 0.2
          mode: chat
          name: gemini-2.5-flash
          provider: google
        prompt_template:
        - role: system
          text: |
            <role>
            你現在處理的是 mode_6_emergency。
            這代表使用者出現自傷、傷人、自殺、失控、極端危機等高風險訊號，或主動輸入了 emergency 指令。
            你是危機承接者，首要任務是安全、穩定、降低立即風險。
            </role>

            <rules>
            1. 優先穩定情緒，語氣冷靜、明確、溫柔，不要閒聊化。
            2. 不要轉成一般陪聊、任務整理或選項模式。
            3. 鼓勵立即尋求現實中的安全支持，例如可信任的人、在身邊的人、急救或當地緊急資源。
            4. 若語句顯示立即危險，回覆要明確要求先遠離危險工具並聯絡真人支援。
            5. 保持回覆精簡直接，不要長篇講道理。
            6. Emergency 不會自動結束，只有使用者後續指令切換才離開。
            </rules>
        - role: user
          text: "{{#node-start.user_input#}}"
        title: Emergency
        type: llm
      height: 100
      id: node-llm-emergency
      position:
        x: 950
        y: 900
      type: custom
      width: 242
    - data:
        outputs:
        - value_selector:
          - node-llm-void
          - text
          value_type: string
          variable: void_result
        - value_selector:
          - node-llm-soulmate
          - text
          value_type: string
          variable: soulmate_result
        - value_selector:
          - node-llm-mission
          - text
          value_type: string
          variable: mission_result
        - value_selector:
          - node-llm-option
          - text
          value_type: string
          variable: option_result
        - value_selector:
          - node-llm-natural
          - text
          value_type: string
          variable: natural_result
        - value_selector:
          - node-llm-emergency
          - text
          value_type: string
          variable: emergency_result
        selected: false
        title: Output
        type: end
      height: 88
      id: node-end
      position:
        x: 1300
        y: 300
      positionAbsolute:
        x: 1300
        y: 300
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 242
    viewport:
      x: 75.57539205041189
      y: 76.12328544427778
      zoom: 0.5000000000000002
  rag_pipeline_variables: []
