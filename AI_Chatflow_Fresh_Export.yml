    nodes:
    - data:
        title: Start
        type: start
        variables: []
      id: start
      position:
        x: 80
        y: 420
      positionAbsolute:
        x: 80
        y: 420
      sourcePosition: right
      targetPosition: left
      type: custom
    - data:
        classes:
        - id: cmd_auto
          name: Auto
        - id: cmd_void
          name: Void
        - id: cmd_soulmate
          name: Soulmate
        - id: cmd_mission
          name: Mission
        - id: cmd_option
          name: Option
        - id: cmd_natural
          name: Natural
        - id: cmd_clarify
          name: Clarify
        - id: cmd_none
          name: None
        instruction: |
          你要判斷使用者這一輪是否在輸入「模式切換指令」。
          只有在使用者明確是在下指令時，才輸出對應類別。
          可接受的指令例子包含：
          auto, /auto, soulmate, /soulmate, mission, /mission, option, /option, natural, /natural, void, /void, clarify, /clarify。
          如果只是正常對話中提到這些字，不算指令，請輸出 cmd_none。
          只輸出一個類別代號。
        model:
          completion_params:
            temperature: 0
          mode: chat
          name: ''
          provider: ''
        query_variable_selector:
        - sys
        - query
        title: Command Detector
        type: question-classifier
      id: command-detector
      position:
        x: 180
        y: 420
      positionAbsolute:
        x: 180
        y: 420
      sourcePosition: right
      targetPosition: left
      type: custom
    - data:
        classes:
        - id: red_flag
          name: Red Flag
        - id: normal
          name: Normal
        instruction: |
          你是高風險偵測器。
          如果使用者出現自傷、自殺、想消失、活不下去、極端絕望、明確危險、請求立即幫助等危機訊號，輸出 red_flag。
          其餘情況輸出 normal。
          只輸出類別代號，不要解釋。
        model:
          completion_params:
            temperature: 0
          mode: chat
          name: ''
          provider: ''
        query_variable_selector:
        - sys
        - query
        title: Risk Detector
        type: question-classifier
      id: risk-detector
      position:
        x: 340
        y: 120
      positionAbsolute:
        x: 340
        y: 120
      sourcePosition: right
      targetPosition: left
      type: custom
    - data:
        context:
          enabled: false
          variable_selector: []
        memory:
          query_prompt_template: '{{#sys.query#}}


            {{#sys.files#}}'
          window:
            enabled: false
            size: 10
        model:
          completion_params:
            temperature: 0
          mode: chat
          name: ''
          provider: ''
        prompt_template:
        - role: system
          text: |
            你要把高風險訊號整理成簡短 JSON 字串。
            欄位固定為:
            {
              "route_type":"safety",
              "source_mode":"safety",
              "followup_status":"resolved",
              "risk_level":"high",
              "sentiment_tags":["..."],
              "behavioral_tags":["..."],
              "cognitive_tags":["..."],
              "warning_tags":["..."],
              "signals":["..."],
              "summary":"..."
            }
            只輸出 JSON，不要多餘文字。
        title: Risk Structurer
        type: llm
        vision:
          enabled: false
      id: risk-structurer
      position:
        x: 620
        y: 40
      positionAbsolute:
        x: 620
        y: 40
      sourcePosition: right
      targetPosition: left
      type: custom
    - data:
        items:
        - input_type: constant
          operation: overwrite
          value: 'true'
          variable_selector:
          - conversation
          - risk_flag
        - input_type: variable
          operation: overwrite
          value:
          - risk-structurer
          - text
          variable_selector:
          - conversation
          - red_flag_payload
        - input_type: variable
          operation: overwrite
          value:
          - risk-structurer
          - text
          variable_selector:
          - conversation
          - latest_tag_payload
        - input_type: constant
          operation: overwrite
          value: ''
          variable_selector:
          - conversation
          - pending_question
        - input_type: constant
          operation: overwrite
          value: safety
          variable_selector:
