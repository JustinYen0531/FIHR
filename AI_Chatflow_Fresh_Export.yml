app:
  description: AI companion chatflow rebuilt on the latest exported advanced-chat skeleton
  icon: 🤖
  icon_background: '#FFEAD5'
  icon_type: emoji
  mode: advanced-chat
  name: AI_Chat_Companion_New_Skeleton
  use_icon_as_answer_icon: false
dependencies: []
kind: app
version: 0.6.0
workflow:
  conversation_variables:
  - id: pending-question-var
    name: pending_question
    description: Store the latest clarification question so the next turn can answer it
    selector:
    - conversation
    - pending_question
    value: ''
    value_type: string
  - id: risk-flag-var
    name: risk_flag
    description: Whether the latest user turn hit a red flag path
    selector:
    - conversation
    - risk_flag
    value: 'false'
    value_type: string
  - id: red-flag-payload-var
    name: red_flag_payload
    description: Structured JSON-like summary for the latest detected red flag
    selector:
    - conversation
    - red_flag_payload
    value: ''
    value_type: string
  - id: followup-turn-count-var
    name: followup_turn_count
    description: Number of consecutive clarification turns in the current follow-up chain
    selector:
    - conversation
    - followup_turn_count
    value: '0'
    value_type: string
  - id: followup-status-var
    name: followup_status
    description: Current follow-up lifecycle state
    selector:
    - conversation
    - followup_status
    value: none
    value_type: string
  - id: active-mode-var
    name: active_mode
    description: Last resolved routing mode for the current turn
    selector:
    - conversation
    - active_mode
    value: ''
    value_type: string
  - id: latest-tag-payload-var
    name: latest_tag_payload
    description: Structured tag output for the latest normal user turn
    selector:
    - conversation
    - latest_tag_payload
    value: ''
    value_type: string
  - id: hamd-progress-state-var
    name: hamd_progress_state
    description: Structured HAM-D progress snapshot for mission mode
    selector:
    - conversation
    - hamd_progress_state
    value: ''
    value_type: string
  - id: summary-draft-state-var
    name: summary_draft_state
    description: Unified pre-summary state for future clinician draft generation
    selector:
    - conversation
    - summary_draft_state
    value: ''
    value_type: string
  - id: clinician-summary-draft-var
    name: clinician_summary_draft
    description: Clinician-facing draft summary generated from the unified summary state
    selector:
    - conversation
    - clinician_summary_draft
    value: ''
    value_type: string
  - id: routing-mode-override-var
    name: routing_mode_override
    description: Persisted manual routing mode override; empty means auto routing
    selector:
    - conversation
    - routing_mode_override
    value: ''
    value_type: string
  - id: command-feedback-var
    name: command_feedback
    description: Short confirmation text for command-mode switches
    selector:
    - conversation
    - command_feedback
    value: ''
    value_type: string
  environment_variables: []
  features:
    file_upload:
      allowed_file_extensions:
      - .JPG
      - .JPEG
      - .PNG
      - .GIF
      - .WEBP
      - .SVG
      allowed_file_types:
      - image
      allowed_file_upload_methods:
      - local_file
      - remote_url
      enabled: false
      fileUploadConfig:
        attachment_image_file_size_limit: 2
        audio_file_size_limit: 50
        batch_count_limit: 5
        file_size_limit: 15
        file_upload_limit: 50
        image_file_batch_limit: 10
        image_file_size_limit: 10
        single_chunk_attachment_limit: 10
        video_file_size_limit: 100
        workflow_file_upload_limit: 10
      image:
        enabled: false
        number_limits: 3
        transfer_methods:
        - local_file
        - remote_url
      number_limits: 3
    opening_statement: ''
    retriever_resource:
      enabled: true
    sensitive_word_avoidance:
      enabled: false
    speech_to_text:
      enabled: false
    suggested_questions: []
    suggested_questions_after_answer:
      enabled: false
    text_to_speech:
      enabled: false
      language: ''
      voice: ''
  graph:
    edges:
    - data:
        sourceType: start
        targetType: question-classifier
      id: start-command-detector
      source: start
      sourceHandle: source
      target: command-detector
      targetHandle: target
      type: custom
    - data:
        sourceType: question-classifier
        targetType: question-classifier
      id: command-none-risk-detector
      source: command-detector
      sourceHandle: cmd_none
      target: risk-detector
      targetHandle: target
      type: custom
    - data:
        sourceType: question-classifier
        targetType: assigner
      id: command-auto-set
      source: command-detector
      sourceHandle: cmd_auto
      target: set-command-auto
      targetHandle: target
      type: custom
    - data:
        sourceType: question-classifier
        targetType: assigner
      id: command-void-set
      source: command-detector
      sourceHandle: cmd_void
      target: set-command-void
      targetHandle: target
      type: custom
    - data:
        sourceType: question-classifier
        targetType: assigner
