app:
  description: AI companion chatflow rebuilt on the latest exported advanced-chat skeleton
  icon: 🤖
  icon_background: '#FFEAD5'
  icon_type: emoji
  mode: advanced-chat
  name: AI_Chat_Companion_New_Skeleton
  use_icon_as_answer_icon: false
dependencies: []
kind: app
version: 0.6.0
workflow:
  conversation_variables:
  - id: pending-question-var
    name: pending_question
    description: Store the latest clarification question so the next turn can answer it
    selector:
    - conversation
    - pending_question
    value: ''
    value_type: string
  - id: risk-flag-var
    name: risk_flag
    description: Whether the latest user turn hit a red flag path
    selector:
    - conversation
    - risk_flag
    value: 'false'
    value_type: string
  - id: red-flag-payload-var
    name: red_flag_payload
    description: Structured JSON-like summary for the latest detected red flag
    selector:
    - conversation
    - red_flag_payload
    value: ''
    value_type: string
  - id: followup-turn-count-var
    name: followup_turn_count
    description: Number of consecutive clarification turns in the current follow-up chain
    selector:
    - conversation
    - followup_turn_count
    value: '0'
    value_type: string
  - id: followup-status-var
    name: followup_status
    description: Current follow-up lifecycle state
    selector:
    - conversation
    - followup_status
    value: none
    value_type: string
  - id: active-mode-var
    name: active_mode
    description: Last resolved routing mode for the current turn
    selector:
    - conversation
    - active_mode
    value: ''
    value_type: string
  environment_variables: []
  features:
    file_upload:
      allowed_file_extensions:
      - .JPG
      - .JPEG
      - .PNG
      - .GIF
      - .WEBP
      - .SVG
      allowed_file_types:
      - image
      allowed_file_upload_methods:
      - local_file
      - remote_url
      enabled: false
      fileUploadConfig:
        attachment_image_file_size_limit: 2
        audio_file_size_limit: 50
        batch_count_limit: 5
        file_size_limit: 15
        file_upload_limit: 50
        image_file_batch_limit: 10
        image_file_size_limit: 10
        single_chunk_attachment_limit: 10
        video_file_size_limit: 100
        workflow_file_upload_limit: 10
      image:
        enabled: false
        number_limits: 3
        transfer_methods:
        - local_file
        - remote_url
      number_limits: 3
    opening_statement: ''
    retriever_resource:
      enabled: true
    sensitive_word_avoidance:
      enabled: false
    speech_to_text:
      enabled: false
    suggested_questions: []
    suggested_questions_after_answer:
      enabled: false
    text_to_speech:
      enabled: false
      language: ''
      voice: ''
  graph:
    edges:
    - data:
        sourceType: start
        targetType: question-classifier
      id: start-risk-detector
      source: start
      sourceHandle: source
      target: risk-detector
      targetHandle: target
      type: custom
    - data:
        sourceType: question-classifier
        targetType: llm
      id: risk-redflag-structurer
      source: risk-detector
      sourceHandle: red_flag
      target: risk-structurer
      targetHandle: target
      type: custom
    - data:
        sourceType: question-classifier
        targetType: assigner
      id: risk-normal-clear
      source: risk-detector
      sourceHandle: normal
      target: clear-risk-state
      targetHandle: target
      type: custom
    - data:
        sourceType: assigner
        targetType: if-else
      id: clear-risk-followup-gate
      source: clear-risk-state
      sourceHandle: source
      target: followup-gate
      targetHandle: target
      type: custom
    - data:
        sourceType: if-else
        targetType: if-else
      id: gate-followup-limit
      source: followup-gate
      sourceHandle: 'true'
      target: followup-limit-gate
      targetHandle: target
      type: custom
    - data:
        sourceType: llm
        targetType: assigner
      id: risk-structurer-assign
      source: risk-structurer
      sourceHandle: source
      target: set-risk-state
      targetHandle: target
      type: custom
    - data:
        sourceType: assigner
        targetType: llm
      id: set-risk-safety
      source: set-risk-state
      sourceHandle: source
      target: safety-response
      targetHandle: target
      type: custom
    - data:
        sourceType: llm
        targetType: answer
      id: safety-answer-edge
      source: safety-response
      sourceHandle: source
      target: answer-safety
      targetHandle: target
      type: custom
    - data:
        sourceType: if-else
        targetType: question-classifier
      id: gate-followup-resolver
      source: followup-limit-gate
      sourceHandle: 'false'
      target: llm-followup
      targetHandle: target
      type: custom
    - data:
        sourceType: if-else
        targetType: llm
      id: gate-followup-finalize
      source: followup-limit-gate
      sourceHandle: 'true'
      target: llm-followup-final
      targetHandle: target
      type: custom
    - data:
        sourceType: if-else
        targetType: question-classifier
      id: gate-classifier
      source: followup-gate
      sourceHandle: 'false'
      target: classifier
      targetHandle: target
      type: custom
    - data:
        sourceType: question-classifier
        targetType: assigner
      id: classifier-void
      source: classifier
      sourceHandle: mode_1_void
      target: set-mode-void
      targetHandle: target
      type: custom
    - data:
        sourceType: assigner
        targetType: llm
      id: set-mode-void-llm
      source: set-mode-void
      sourceHandle: source
      target: llm-void
      targetHandle: target
      type: custom
    - data:
        sourceType: question-classifier
        targetType: assigner
      id: classifier-soulmate
      source: classifier
      sourceHandle: mode_2_soulmate
      target: set-mode-soulmate
      targetHandle: target
      type: custom
    - data:
        sourceType: assigner
        targetType: llm
      id: set-mode-soulmate-llm
      source: set-mode-soulmate
      sourceHandle: source
      target: llm-soulmate
      targetHandle: target
      type: custom
    - data:
        sourceType: question-classifier
        targetType: assigner
      id: classifier-mission
      source: classifier
      sourceHandle: mode_3_mission
      target: set-mode-mission
      targetHandle: target
      type: custom
    - data:
        sourceType: assigner
        targetType: knowledge-retrieval
      id: set-mode-mission-retrieval
      source: set-mode-mission
      sourceHandle: source
      target: retrieval-mission
      targetHandle: target
      type: custom
    - data:
        sourceType: question-classifier
        targetType: assigner
      id: classifier-option
      source: classifier
      sourceHandle: mode_4_option
      target: set-mode-option
      targetHandle: target
      type: custom
    - data:
        sourceType: assigner
        targetType: knowledge-retrieval
      id: set-mode-option-retrieval
      source: set-mode-option
      sourceHandle: source
      target: retrieval-option
      targetHandle: target
      type: custom
    - data:
        sourceType: question-classifier
        targetType: assigner
      id: classifier-natural
      source: classifier
      sourceHandle: mode_5_natural
      target: set-mode-natural
      targetHandle: target
      type: custom
    - data:
        sourceType: assigner
        targetType: llm
      id: set-mode-natural-llm
      source: set-mode-natural
      sourceHandle: source
      target: llm-natural
      targetHandle: target
      type: custom
    - data:
        sourceType: question-classifier
        targetType: assigner
      id: classifier-clarify
      source: classifier
      sourceHandle: mode_6_clarify
      target: set-mode-clarify
      targetHandle: target
      type: custom
    - data:
        sourceType: assigner
        targetType: llm
      id: set-mode-clarify-llm
      source: set-mode-clarify
      sourceHandle: source
      target: llm-clarify
      targetHandle: target
      type: custom
    - data:
        sourceType: knowledge-retrieval
        targetType: llm
      id: retrieval-mission-llm
      source: retrieval-mission
      sourceHandle: source
      target: llm-mission
      targetHandle: target
      type: custom
    - data:
        sourceType: knowledge-retrieval
        targetType: llm
      id: retrieval-option-llm
      source: retrieval-option
      sourceHandle: source
      target: llm-option
      targetHandle: target
      type: custom
    - data:
        sourceType: llm
        targetType: question-classifier
      id: followup-output-classify-edge
      source: llm-followup
      sourceHandle: source
      target: followup-output-classifier
      targetHandle: target
      type: custom
    - data:
        sourceType: question-classifier
        targetType: assigner
      id: followup-output-askmore
      source: followup-output-classifier
      sourceHandle: followup_ask_more
      target: save-pending-followup
      targetHandle: target
      type: custom
    - data:
        sourceType: question-classifier
        targetType: assigner
      id: followup-output-answernow
      source: followup-output-classifier
      sourceHandle: followup_answer_now
      target: clear-pending
      targetHandle: target
      type: custom
    - data:
        sourceType: llm
        targetType: assigner
      id: followup-final-clear
      source: llm-followup-final
      sourceHandle: source
      target: clear-pending
      targetHandle: target
      type: custom
    - data:
        sourceType: llm
        targetType: assigner
      id: clarify-save
      source: llm-clarify
      sourceHandle: source
      target: save-pending
      targetHandle: target
      type: custom
    - data:
        sourceType: llm
        targetType: answer
      id: void-answer-edge
      source: llm-void
      sourceHandle: source
      target: answer-void
      targetHandle: target
      type: custom
    - data:
        sourceType: llm
        targetType: answer
      id: soulmate-answer-edge
      source: llm-soulmate
      sourceHandle: source
      target: answer-soulmate
      targetHandle: target
      type: custom
    - data:
        sourceType: llm
        targetType: answer
      id: mission-answer-edge
      source: llm-mission
      sourceHandle: source
      target: answer-mission
      targetHandle: target
      type: custom
    - data:
        sourceType: llm
        targetType: answer
      id: option-answer-edge
      source: llm-option
      sourceHandle: source
      target: answer-option
      targetHandle: target
      type: custom
    - data:
        sourceType: llm
        targetType: answer
      id: natural-answer-edge
      source: llm-natural
      sourceHandle: source
      target: answer-natural
      targetHandle: target
      type: custom
    - data:
        sourceType: assigner
        targetType: answer
      id: followup-answer-edge
      source: clear-pending
      sourceHandle: source
      target: answer-followup
      targetHandle: target
      type: custom
    - data:
        sourceType: assigner
        targetType: answer
      id: clarify-answer-edge
      source: save-pending
      sourceHandle: source
      target: answer-clarify
      targetHandle: target
      type: custom
    nodes:
    - data:
        title: Start
        type: start
        variables: []
      id: start
      position:
        x: 80
        y: 420
      positionAbsolute:
        x: 80
        y: 420
      sourcePosition: right
      targetPosition: left
      type: custom
    - data:
        classes:
        - id: red_flag
          name: Red Flag
        - id: normal
          name: Normal
        instruction: |
          你是高風險偵測器。
          如果使用者出現自傷、自殺、想消失、活不下去、極端絕望、明確危險、請求立即幫助等危機訊號，輸出 red_flag。
          其餘情況輸出 normal。
          只輸出類別代號，不要解釋。
        model:
          completion_params:
            temperature: 0
          mode: chat
          name: ''
          provider: ''
        query_variable_selector:
        - sys
        - query
        title: Risk Detector
        type: question-classifier
      id: risk-detector
      position:
        x: 340
        y: 120
      positionAbsolute:
        x: 340
        y: 120
      sourcePosition: right
      targetPosition: left
      type: custom
    - data:
        context:
          enabled: false
          variable_selector: []
        memory:
          query_prompt_template: '{{#sys.query#}}


            {{#sys.files#}}'
          window:
            enabled: false
            size: 10
        model:
          completion_params:
            temperature: 0
          mode: chat
          name: ''
          provider: ''
        prompt_template:
        - role: system
          text: |
            你要把高風險訊號整理成簡短 JSON 字串。
            欄位固定為:
            {"risk_level":"high","signals":["..."],"summary":"..."}
            只輸出 JSON，不要多餘文字。
        title: Risk Structurer
        type: llm
        vision:
          enabled: false
      id: risk-structurer
      position:
        x: 620
        y: 40
      positionAbsolute:
        x: 620
        y: 40
      sourcePosition: right
      targetPosition: left
      type: custom
    - data:
        items:
        - input_type: constant
          operation: overwrite
          value: 'true'
          variable_selector:
          - conversation
          - risk_flag
        - input_type: variable
          operation: overwrite
          value:
          - risk-structurer
          - text
          variable_selector:
          - conversation
          - red_flag_payload
        - input_type: constant
          operation: overwrite
          value: ''
          variable_selector:
          - conversation
          - pending_question
        - input_type: constant
          operation: overwrite
          value: safety
          variable_selector:
          - conversation
          - active_mode
        title: Set Risk State
        type: assigner
        version: '2'
      id: set-risk-state
      position:
        x: 900
        y: 40
      positionAbsolute:
        x: 900
        y: 40
      sourcePosition: right
      targetPosition: left
      type: custom
    - data:
        items:
        - input_type: constant
          operation: overwrite
          value: 'false'
          variable_selector:
          - conversation
          - risk_flag
        - input_type: constant
          operation: overwrite
          value: ''
          variable_selector:
          - conversation
          - red_flag_payload
        title: Clear Risk State
        type: assigner
        version: '2'
      id: clear-risk-state
      position:
        x: 620
        y: 180
      positionAbsolute:
        x: 620
        y: 180
      sourcePosition: right
      targetPosition: left
      type: custom
    - data:
        context:
          enabled: false
          variable_selector: []
        memory:
          query_prompt_template: '{{#sys.query#}}


            {{#sys.files#}}'
          window:
            enabled: false
            size: 10
        model:
          completion_params:
            temperature: 0.2
          mode: chat
          name: ''
          provider: ''
        prompt_template:
        - role: system
          text: |
            你是 AI Companion 的安全回應節點。
            先用溫和語氣接住對方。
            明確鼓勵立刻聯絡身邊可信任的人、當地緊急服務或危機協助資源。
            不要轉進一般聊天，也不要進行一般任務引導。
            回覆保持簡潔、直接、以安全為優先。
        title: Safety Response
        type: llm
        vision:
          enabled: false
      id: safety-response
      position:
        x: 1180
        y: 40
      positionAbsolute:
        x: 1180
        y: 40
      sourcePosition: right
      targetPosition: left
      type: custom
    - data:
        items:
        - input_type: constant
          operation: overwrite
          value: mode_1_void
          variable_selector:
          - conversation
          - active_mode
        title: Set Active Mode Void
        type: assigner
        version: '2'
      id: set-mode-void
      position:
        x: 900
        y: 20
      positionAbsolute:
        x: 900
        y: 20
      sourcePosition: right
      targetPosition: left
      type: custom
    - data:
        items:
        - input_type: constant
          operation: overwrite
          value: mode_2_soulmate
          variable_selector:
          - conversation
          - active_mode
        title: Set Active Mode Soulmate
        type: assigner
        version: '2'
      id: set-mode-soulmate
      position:
        x: 900
        y: 180
      positionAbsolute:
        x: 900
        y: 180
      sourcePosition: right
      targetPosition: left
      type: custom
    - data:
        items:
        - input_type: constant
          operation: overwrite
          value: mode_3_mission
          variable_selector:
          - conversation
          - active_mode
        title: Set Active Mode Mission
        type: assigner
        version: '2'
      id: set-mode-mission
      position:
        x: 900
        y: 300
      positionAbsolute:
        x: 900
        y: 300
      sourcePosition: right
      targetPosition: left
      type: custom
    - data:
        items:
        - input_type: constant
          operation: overwrite
          value: mode_4_option
          variable_selector:
          - conversation
          - active_mode
        title: Set Active Mode Option
        type: assigner
        version: '2'
      id: set-mode-option
      position:
        x: 900
        y: 480
      positionAbsolute:
        x: 900
        y: 480
      sourcePosition: right
      targetPosition: left
      type: custom
    - data:
        items:
        - input_type: constant
          operation: overwrite
          value: mode_5_natural
          variable_selector:
          - conversation
          - active_mode
        title: Set Active Mode Natural
        type: assigner
        version: '2'
      id: set-mode-natural
      position:
        x: 900
        y: 660
      positionAbsolute:
        x: 900
        y: 660
      sourcePosition: right
      targetPosition: left
      type: custom
    - data:
        items:
        - input_type: constant
          operation: overwrite
          value: mode_6_clarify
          variable_selector:
          - conversation
          - active_mode
        title: Set Active Mode Clarify
        type: assigner
        version: '2'
      id: set-mode-clarify
      position:
        x: 900
        y: 840
      positionAbsolute:
        x: 900
        y: 840
      sourcePosition: right
      targetPosition: left
      type: custom
    - data:
        cases:
        - case_id: pending_not_empty
          conditions:
          - comparison_operator: is not empty
            variable_selector:
            - conversation
            - pending_question
        title: Follow-up Gate
        type: if-else
      id: followup-gate
      position:
        x: 340
        y: 420
      positionAbsolute:
        x: 340
        y: 420
      sourcePosition: right
      targetPosition: left
      type: custom
    - data:
        cases:
        - case_id: limit_reached
          conditions:
          - comparison_operator: is
            value: '2'
            variable_selector:
            - conversation
            - followup_turn_count
        title: Follow-up Limit Gate
        type: if-else
      id: followup-limit-gate
      position:
        x: 620
        y: 160
      positionAbsolute:
        x: 620
        y: 160
      sourcePosition: right
      targetPosition: left
      type: custom
    - data:
        classes:
        - id: mode_1_void
          name: Void Box
        - id: mode_2_soulmate
          name: Soul Mate
        - id: mode_3_mission
          name: Mission Guide
        - id: mode_4_option
          name: Option Selector
        - id: mode_5_natural
          name: Smart Hunter
        - id: mode_6_clarify
          name: Clarify
        instruction: |
          你是意圖分類器。
          請只輸出最符合的一個類別代號，不要解釋。
          1. mode_1_void: 空白、測試、無意義輸入
          2. mode_2_soulmate: 需要陪伴、共感、情緒支持
          3. mode_3_mission: 任務、步驟、流程、要完成一件事
          4. mode_4_option: 需要比較、選擇、方案判斷
          5. mode_5_natural: 一般自然對話、日常聊天、延續話題
          6. mode_6_clarify: 資訊不足，需要先補一個關鍵問題
        model:
          completion_params:
            temperature: 0
          mode: chat
          name: ''
          provider: ''
        query_variable_selector:
        - sys
        - query
        title: Intent Classifier
        type: question-classifier
      id: classifier
      position:
        x: 620
        y: 280
      positionAbsolute:
        x: 620
        y: 280
      sourcePosition: right
      targetPosition: left
      type: custom
    - data:
        context:
          enabled: false
          variable_selector: []
        memory:
          query_prompt_template: '{{#sys.query#}}


            {{#sys.files#}}'
          window:
            enabled: false
            size: 10
        model:
          completion_params:
            temperature: 0
          mode: chat
          name: ''
          provider: ''
        prompt_template:
        - role: system
          text: |
            你要處理沒有內容或無法辨識的輸入。
            請用一句簡短提醒，請使用者輸入更完整的問題。
        title: Void Box
        type: llm
        vision:
          enabled: false
      id: llm-void
      position:
        x: 940
        y: 20
      positionAbsolute:
        x: 940
        y: 20
      sourcePosition: right
      targetPosition: left
      type: custom
    - data:
        context:
          enabled: false
          variable_selector: []
        memory:
          query_prompt_template: '{{#sys.query#}}


            {{#sys.files#}}'
          window:
            enabled: false
            size: 10
        model:
          completion_params:
            temperature: 0.5
          mode: chat
          name: ''
          provider: ''
        prompt_template:
        - role: system
          text: |
            你是一個溫暖、像真人的朋友。
            規則：
            1. 先接住情緒，再回應。
            2. 不要像客服，不要像問卷。
            3. 回覆要自然、短一點。
        title: Soul Mate
        type: llm
        vision:
          enabled: false
      id: llm-soulmate
      position:
        x: 940
        y: 180
      positionAbsolute:
        x: 940
        y: 180
      sourcePosition: right
      targetPosition: left
      type: custom
    - data:
        dataset_ids:
        - JB1PuOSPlWXMsgVAkT5B4u/hSkfNYLAS+G+Zmysp3Fhot7pSACV7KyX378KBhRU7
        multiple_retrieval_config:
          reranking_enable: false
          reranking_mode: reranking_model
          top_k: 2
        query_attachment_selector: []
        query_variable_selector:
        - sys
        - query
        retrieval_mode: multiple
        title: Mission Retrieval
        type: knowledge-retrieval
      id: retrieval-mission
      position:
        x: 940
        y: 300
      positionAbsolute:
        x: 940
        y: 300
      sourcePosition: right
      targetPosition: left
      type: custom
    - data:
        context:
          enabled: true
          variable_selector:
          - retrieval-mission
          - result
        memory:
          query_prompt_template: '{{#sys.query#}}


            {{#sys.files#}}'
          window:
            enabled: false
            size: 10
        model:
          completion_params:
            temperature: 0.6
          mode: chat
          name: ''
          provider: ''
        prompt_template:
        - role: system
          text: |
            你是任務導向的引導助手。
            目標是把問題整理成可執行的步驟。
            規則：
            1. 先回應使用者的核心目標。
            2. 若知識庫有內容，優先使用知識庫內容。
            3. 輸出要清楚、分段、可行。
        title: Mission Guide
        type: llm
        vision:
          enabled: false
      id: llm-mission
      position:
        x: 1240
        y: 300
      positionAbsolute:
        x: 1240
        y: 300
      sourcePosition: right
      targetPosition: left
      type: custom
    - data:
        dataset_ids:
        - JB1PuOSPlWXMsgVAkT5B4u/hSkfNYLAS+G+Zmysp3Fhot7pSACV7KyX378KBhRU7
        multiple_retrieval_config:
          reranking_enable: false
          reranking_mode: reranking_model
          top_k: 4
        query_attachment_selector: []
        query_variable_selector:
        - sys
